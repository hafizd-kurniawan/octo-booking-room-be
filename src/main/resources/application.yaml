server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

spring:
  application:
    name: booking-room

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:gondola.proxy.rlwy.net}:${MYSQLPORT:52250}/${MYSQLDATABASE:railway}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:root}}
    password: ${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:htSlHYHHPNXzFAQOLnlvxhXbKkdRrjOx}}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-on-validation-error: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

jwt:
  secret: ${JWT_SECRET:J3CW7Xf3vQ9jgJTjOQ4SWMs47Ik2UInPva9PFBNL5dU=}
