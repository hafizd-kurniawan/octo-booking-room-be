spring:
  application:
    name: booking-room
  datasource:
    url: jdbc:mysql://localhost:3306/octo_booking_room?useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  
# secret used to sign JWTs.  Must be at least 32 bytes long (HS256 requirements).
jwt:
  secret: "8a7f1e3c-7a2f-4d9b-9d5e-1234567890abcdef1234567890abcdef"
